<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Synergy · Corona Travel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;700&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:      #1a1d4a;
  --navy-d:    #0f1130;
  --navy-m:    #252960;
  --gold:      #B2906A;
  --gold-lt:   #C8A97E;
  --gold-g:    rgba(178,144,106,0.12);
  --gold-b:    rgba(178,144,106,0.22);
  --text:      rgba(255,255,255,0.93);
  --text-m:    rgba(255,255,255,0.52);
  --text-d:    rgba(255,255,255,0.22);
  --border:    rgba(178,144,106,0.14);
  --border-m:  rgba(178,144,106,0.26);
  --surf:      rgba(26,29,74,0.7);
  --surf-d:    rgba(15,17,48,0.85);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--navy-d);
  color:var(--text);
  font-family:'Onest',sans-serif;
  font-weight:300;
  overflow-x:hidden;
  
}

/* NOISE */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.022;pointer-events:none;z-index:998;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:68px;padding:0 56px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(12,14,42,.92);
  backdrop-filter:blur(16px);
  transition:background .4s;
}
.nav-logo img{height:34px;display:block}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{
  color:var(--text-m);text-decoration:none;
  font-family:'Onest',sans-serif;font-size:11px;font-weight:400;
  letter-spacing:.2em;text-transform:uppercase;
  transition:color .25s;position:relative;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-4px;left:0;right:0;
  height:1px;background:var(--gold);
  transform:scaleX(0);transform-origin:left;transition:transform .3s;
}
.nav-links a:hover{color:var(--gold-lt)}
.nav-links a:hover::after{transform:scaleX(1)}
.nav-btn{
  padding:10px 26px;border:1px solid var(--gold);color:var(--gold);
  font-family:'Onest',sans-serif;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;text-decoration:none;font-weight:400;
  transition:all .3s;position:relative;overflow:hidden;
}
.nav-btn::before{
  content:'';position:absolute;inset:0;background:var(--gold);
  transform:translateX(-101%);transition:transform .3s;z-index:-1;
}
.nav-btn:hover{color:var(--navy-d)}
.nav-btn:hover::before{transform:translateX(0)}

/* HERO */
.hero{
  min-height:100vh;position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:120px 56px 100px;
  background:
    radial-gradient(ellipse 70% 55% at 12% 45%, rgba(48,54,114,.65) 0%,transparent 60%),
    radial-gradient(ellipse 45% 35% at 88% 25%, rgba(178,144,106,.09) 0%,transparent 50%),
    linear-gradient(165deg,#141740 0%,#0b0d28 45%,#13112e 100%);
}

/* wave SVG bg */
.hero-wave{position:absolute;inset:0;overflow:hidden;opacity:.1}
.hero-wave svg{position:absolute;bottom:-15%;left:-5%;width:110%;animation:wdrift 20s ease-in-out infinite alternate}
@keyframes wdrift{from{transform:translateX(0) translateY(0)}to{transform:translateX(2%) translateY(-2%)}}

.orb{position:absolute;border-radius:50%;filter:blur(70px);animation:ofl 14s ease-in-out infinite alternate}
.orb1{width:380px;height:380px;background:radial-gradient(circle,rgba(48,54,114,.55),transparent);top:-80px;right:-60px}
.orb2{width:260px;height:260px;background:radial-gradient(circle,rgba(178,144,106,.13),transparent);bottom:80px;left:8%;animation-delay:-6s;animation-duration:11s}
@keyframes ofl{from{transform:translate(0,0) scale(1)}to{transform:translate(24px,-18px) scale(1.08)}}

.hero-inner{position:relative;z-index:2;max-width:860px;text-align:center}

.h-eyebrow{
  display:inline-flex;align-items:center;gap:14px;margin-bottom:36px;
  opacity:0;animation:fup .8s .2s ease forwards;
}
.h-eline{width:36px;height:1px;background:var(--gold);opacity:.55}
.h-etxt{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:400}

.hero h1{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(44px,7vw,82px);
  font-weight:300;line-height:1.08;letter-spacing:-.02em;
  margin-bottom:12px;
  opacity:0;animation:fup .9s .4s ease forwards;
}
.hero h1 em{font-style:normal;color:var(--gold-lt);font-weight:400}

.hero-sub{
  font-family:'Onest',sans-serif;font-size:clamp(14px,2vw,18px);
  color:var(--text-m);font-weight:300;letter-spacing:.05em;
  margin-bottom:44px;
  opacity:0;animation:fup .9s .6s ease forwards;
}

.hero-desc{
  font-size:15px;line-height:1.85;color:var(--text-m);
  max-width:520px;margin:0 auto 52px;font-weight:300;
  opacity:0;animation:fup .9s .8s ease forwards;
}
.hero-desc strong{color:var(--gold-lt);font-weight:400}

.hero-acts{
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  opacity:0;animation:fup .9s 1s ease forwards;
}
.btn-g{
  padding:17px 46px;background:var(--gold);color:var(--navy-d);
  font-family:'Onest',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.22em;text-transform:uppercase;border:none;
  text-decoration:none;display:inline-block;transition:transform .3s,box-shadow .3s;
  position:relative;overflow:hidden;
}
.btn-g::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.14);transform:translateX(-101%);transition:transform .4s}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(178,144,106,.32)}
.btn-g:hover::before{transform:translateX(0)}
.btn-o{
  padding:17px 46px;background:transparent;color:var(--text);
  font-family:'Onest',sans-serif;font-size:11px;font-weight:300;
  letter-spacing:.22em;text-transform:uppercase;
  border:1px solid var(--border-m);
  text-decoration:none;display:inline-block;transition:border-color .3s,color .3s,transform .3s;
}
.btn-o:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-2px)}

.hero-scroll{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:0;animation:fi 1s 1.6s ease forwards;
}
.scr-line{width:1px;height:44px;background:linear-gradient(180deg,transparent,var(--gold));animation:sp 2.2s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.3;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}
.scr-txt{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-d)}

/* STATS */
.stats{padding:0 56px}
.stats-grid{
  max-width:1200px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);border:1px solid var(--border);
}
.stat{
  background:var(--navy-d);padding:44px 36px;
  position:relative;overflow:hidden;transition:background .3s;
}
.stat:hover{background:var(--surf)}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--gold),transparent);opacity:0;transition:opacity .3s}
.stat:hover::after{opacity:1}
.stat-n{
  font-family:'Unbounded',sans-serif;font-size:clamp(36px,4vw,52px);
  font-weight:300;color:var(--gold);line-height:1;margin-bottom:10px;
}
.stat-l{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-d);font-weight:300;line-height:1.6}

/* SECTIONS */
.sec{padding:110px 56px;position:relative}
.sec-in{max-width:1200px;margin:0 auto}

.sec-tag{display:inline-flex;align-items:center;gap:12px;margin-bottom:20px}
.sec-tag span{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:400}
.tag-n{
  width:22px;height:22px;border:1px solid var(--gold-g);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--gold);font-weight:400;
}

h2{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(28px,4vw,48px);
  font-weight:300;line-height:1.15;letter-spacing:-.02em;
  margin-bottom:20px;
}
h2 em{font-style:normal;color:var(--gold-lt)}
.gdiv{width:52px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin:20px 0}

/* WHY section */
.why-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--border);border:1px solid var(--border);
  margin-top:60px;
}
.why-card{
  background:var(--navy-d);padding:44px 36px;
  position:relative;overflow:hidden;transition:background .4s;
}
.why-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .5s;
}
.why-card:hover{background:var(--surf)}
.why-card:hover::before{transform:scaleX(1)}
.why-n{
  font-family:'Unbounded',sans-serif;font-size:48px;
  font-weight:300;color:rgba(178,144,106,.15);
  line-height:1;margin-bottom:18px;transition:color .4s;
}
.why-card:hover .why-n{color:rgba(178,144,106,.35)}
.why-t{
  font-family:'Unbounded',sans-serif;font-size:16px;
  font-weight:400;margin-bottom:14px;line-height:1.35;letter-spacing:-.01em;
}
.why-d{font-size:13px;line-height:1.8;color:var(--text-m);font-weight:300}

/* SOLUTION */
.sol-sec{
  padding:110px 56px;
  background:linear-gradient(180deg,transparent 0%,rgba(178,144,106,.03) 50%,transparent 100%);
  position:relative;overflow:hidden;
}
.sol-sec::before{
  content:'';position:absolute;left:-180px;top:50%;transform:translateY(-50%);
  width:560px;height:560px;border:1px solid var(--border);border-radius:50%;opacity:.25;
}
.sol-sec::after{
  content:'';position:absolute;right:-80px;top:15%;
  width:380px;height:380px;border:1px solid var(--border);border-radius:50%;opacity:.15;
}
.sol-layout{
  display:grid;grid-template-columns:1fr 1fr;
  gap:90px;align-items:center;max-width:1200px;margin:0 auto;
}

/* DIAGRAM */
.diag{position:relative;height:460px}
.pri-badge{
  position:absolute;top:16px;right:16px;z-index:20;
  background:linear-gradient(135deg,var(--gold),#8a6840);
  color:var(--navy-d);padding:7px 16px;
  font-family:'Onest',sans-serif;font-size:10px;
  font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.diag-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.diag-ring{
  position:absolute;top:50%;left:50%;border-radius:50%;
  border:1px dashed var(--border-m);animation:rrot 30s linear infinite;
}
.dr1{width:190px;height:190px;margin:-95px 0 0 -95px;animation-duration:22s}
.dr2{width:320px;height:320px;margin:-160px 0 0 -160px;animation-direction:reverse;animation-duration:34s;border-color:rgba(178,144,106,.07)}
@keyframes rrot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.diag-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:90px;height:90px;border:1px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--gold-g);z-index:10;
  animation:cpulse 3.5s ease-in-out infinite;
}
@keyframes cpulse{0%,100%{box-shadow:0 0 0 0 rgba(178,144,106,.28)}50%{box-shadow:0 0 0 20px rgba(178,144,106,0)}}
.dc-txt{text-align:center;font-family:'Onest',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);line-height:1.6}
.nd{position:absolute;transform:translate(-50%,-50%);z-index:5}
.nd-dot{
  width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Onest',sans-serif;font-size:10px;font-weight:500;
  transition:transform .3s,box-shadow .3s;position:relative;
}
.nd-dot:hover{transform:scale(1.14)}
.nd-s .nd-dot{
  background:rgba(48,54,114,.92);border:1px solid rgba(178,144,106,.45);
  color:var(--gold-lt);box-shadow:0 4px 18px rgba(48,54,114,.5);
}
.nd-s .nd-dot:hover{box-shadow:0 8px 28px rgba(178,144,106,.22)}
.nd-b .nd-dot{
  background:rgba(22,20,48,.88);border:1px solid rgba(255,255,255,.13);
  color:var(--text-m);
}
.nd-badge{
  position:absolute;top:-7px;right:-7px;
  background:var(--gold);color:var(--navy-d);
  font-size:7px;font-weight:600;padding:2px 5px;border-radius:8px;
  font-family:'Onest',sans-serif;letter-spacing:.04em;
}
.nd-lbl{
  position:absolute;top:calc(100% + 5px);left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-d);white-space:nowrap;font-family:'Onest',sans-serif;
}
.diag-legend{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;gap:18px;justify-content:center;padding-bottom:4px;
}
.leg-i{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--text-d);font-family:'Onest',sans-serif}
.leg-line{width:18px;height:1px}

/* Features */
.features{margin-top:44px;display:flex;flex-direction:column;gap:0}
.feat{
  padding:24px 0;border-bottom:1px solid var(--border);
  display:flex;gap:20px;align-items:flex-start;
  transition:padding-left .3s;
}
.feat:first-child{border-top:1px solid var(--border)}
.feat:hover{padding-left:8px}
.feat-ico{
  width:38px;height:38px;border:1px solid var(--gold-g);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .3s,background .3s;
}
.feat:hover .feat-ico{border-color:var(--gold);background:var(--gold-g)}
.feat-ico svg{width:18px;height:18px;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.feat-t{
  font-family:'Unbounded',sans-serif;font-size:14px;
  font-weight:400;margin-bottom:5px;letter-spacing:-.01em;
}
.feat-d{font-size:13px;color:var(--text-m);line-height:1.75;font-weight:300}

/* HOW IT WORKS */
.how-sec{padding:110px 56px;position:relative}
.how-sec::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 0%,rgba(26,29,74,.35) 50%,transparent 100%);
  pointer-events:none;
}
.steps{max-width:1200px;margin:60px auto 0;position:relative}
.tl-line{
  position:absolute;left:27px;top:28px;bottom:28px;width:1px;
  background:linear-gradient(180deg,var(--gold),rgba(178,144,106,.08));
}
.step{display:grid;grid-template-columns:56px 1fr;gap:36px;position:relative}
.step-nb{
  width:56px;height:56px;border:1px solid var(--gold-g);background:var(--navy-d);
  display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;font-size:16px;font-weight:300;color:var(--gold);
  flex-shrink:0;position:relative;z-index:2;
  transition:background .3s,border-color .3s;
}
.step:hover .step-nb{background:var(--gold-g);border-color:var(--gold)}
.step-b{padding:4px 0 56px}
.step:last-child .step-b{padding-bottom:0}
.step-t{
  font-family:'Unbounded',sans-serif;font-size:20px;
  font-weight:300;margin-bottom:14px;color:var(--text);letter-spacing:-.02em;
}
.step-t em{font-style:normal;color:var(--gold-lt)}
.step-d{font-size:14px;color:var(--text-m);line-height:1.8;font-weight:300;max-width:580px;margin-bottom:20px}
.step-chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  padding:8px 16px;background:var(--surf);border:1px solid var(--border);
  font-size:12px;color:var(--text-m);font-family:'Onest',sans-serif;font-weight:300;
  letter-spacing:.04em;transition:border-color .3s,color .3s;
}
.chip:hover{border-color:var(--border-m);color:var(--text)}

/* SCHEDULE */
.sch-sec{padding:110px 56px;position:relative;overflow:hidden}
.sch-sec::after{
  content:'';position:absolute;right:-180px;top:50%;transform:translateY(-50%);
  width:640px;height:640px;border:1px solid var(--border);border-radius:50%;opacity:.12;
}
.sch-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);border:1px solid var(--border);
  margin-top:60px;max-width:1200px;margin-left:auto;margin-right:auto;
}
.sch-block{
  background:var(--navy-d);padding:36px 28px;
  position:relative;overflow:hidden;transition:background .4s;
}
.sch-block:hover{background:var(--surf)}
.sch-block.morning{border-top:2px solid var(--gold)}
.sch-block.day{border-top:2px solid rgba(48,54,114,.8)}
.sch-block.eve{border-top:2px solid rgba(178,144,106,.35)}
.sch-time{
  font-family:'Unbounded',sans-serif;font-size:28px;
  color:var(--gold);margin-bottom:6px;font-weight:300;
}
.sch-dur{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-d);margin-bottom:18px;font-weight:300}
.sch-t{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:400;margin-bottom:10px;line-height:1.3;letter-spacing:-.01em}
.sch-d{font-size:12px;color:var(--text-m);line-height:1.7;font-weight:300}
.sch-badge{
  display:inline-block;margin-top:14px;padding:4px 12px;
  font-family:'Onest',sans-serif;font-size:9px;letter-spacing:.15em;
  text-transform:uppercase;border-radius:20px;font-weight:400;
}
.ba-pre{background:var(--gold-g);color:var(--gold)}
.ba-free{background:rgba(48,54,114,.4);color:rgba(150,160,220,.9)}

/* MATCHING PLATFORM */
.mtch-sec{padding:110px 56px}
.platform{
  max-width:1200px;margin:60px auto 0;
  background:rgba(12,14,40,.9);border:1px solid var(--border);overflow:hidden;
}
.plat-chrome{
  background:rgba(8,9,28,.95);padding:13px 18px;
  display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);
}
.ch-dots{display:flex;gap:6px}
.ch-dot{width:10px;height:10px;border-radius:50%}
.ch-url{flex:1;text-align:center;font-size:11px;color:var(--text-d);letter-spacing:.04em;font-family:'Onest',sans-serif}
.plat-body{display:flex;height:500px}
.plat-side{
  width:195px;background:rgba(8,9,28,.8);border-right:1px solid var(--border);
  padding:20px 0;flex-shrink:0;
}
.ps-logo{
  padding:0 18px 18px;border-bottom:1px solid var(--border);margin-bottom:14px;
  font-family:'Unbounded',sans-serif;font-size:13px;color:var(--gold);font-weight:300;letter-spacing:-.01em;
}
.ps-sub{font-size:9px;color:var(--text-d);letter-spacing:.12em;text-transform:uppercase;margin-top:3px;font-family:'Onest',sans-serif}
.ps-nav{
  padding:9px 18px;font-size:12px;color:var(--text-d);
  display:flex;align-items:center;gap:8px;
  transition:all .2s;border-left:2px solid transparent;font-family:'Onest',sans-serif;
}
.ps-nav:hover,.ps-nav.on{color:var(--gold);background:var(--gold-g);border-left-color:var(--gold)}
.ps-nav svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ps-bottom{
  position:absolute;bottom:0;left:0;width:195px;padding:14px 18px;
  border-top:1px solid var(--border);
}
.ps-user{display:flex;align-items:center;gap:8px}
.ps-avatar{
  width:30px;height:30px;border-radius:50%;background:rgba(48,54,114,.8);
  border:1px solid var(--border-m);display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--gold-lt);flex-shrink:0;font-family:'Onest',sans-serif;
}
.ps-name{font-size:12px;font-weight:400;font-family:'Onest',sans-serif}
.ps-role{font-size:9px;color:var(--text-d);text-transform:uppercase;letter-spacing:.1em;font-family:'Onest',sans-serif}
.plat-main{flex:1;padding:28px;overflow-y:auto;overflow-x:hidden;position:relative}
.pm-title{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:300;margin-bottom:6px;letter-spacing:-.02em}
.pm-sub{font-size:12px;color:var(--text-m);margin-bottom:20px;font-family:'Onest',sans-serif}
.pm-pri{
  background:var(--gold-g);border:1px solid var(--gold-b);
  padding:12px 16px;margin-bottom:18px;font-size:12px;color:var(--gold-lt);
  display:flex;align-items:center;gap:10px;font-family:'Onest',sans-serif;
}
.pm-pri svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* Match cards */
.mcards{display:flex;flex-direction:column;gap:8px}
.mcard{
  background:rgba(26,29,74,.55);border:1px solid var(--border);
  padding:12px 14px;display:flex;align-items:center;gap:12px;
  transition:border-color .25s,background .25s;
}
.mcard:hover{border-color:var(--border-m);background:rgba(26,29,74,.8)}
.mc-av{
  width:34px;height:34px;border-radius:50%;
  background:rgba(48,54,114,.8);border:1px solid var(--border-m);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--gold-lt);flex-shrink:0;font-family:'Onest',sans-serif;
}
.mc-name{font-size:13px;font-weight:400;flex:1;font-family:'Onest',sans-serif}
.mc-dirs{font-size:11px;color:var(--text-d);margin-top:2px;font-family:'Onest',sans-serif}
.mc-pct{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:300;color:var(--gold)}
.mc-pct.med{color:var(--text-m);font-size:16px}
.mc-btn{
  padding:6px 13px;border:1px solid var(--border-m);background:transparent;
  color:var(--text-m);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  transition:all .2s;font-family:'Onest',sans-serif;
}
.mc-btn:hover{border-color:var(--gold);color:var(--gold)}
.mc-confirmed{
  padding:4px 10px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  background:rgba(79,195,161,.1);color:#4FC3A1;border:1px solid rgba(79,195,161,.2);
  font-family:'Onest',sans-serif;
}

/* Slot modal */
.slot-modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:800;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.slot-modal-bg.open{opacity:1;pointer-events:all}
.slot-modal{
  background:var(--surf-d);border:1px solid var(--border);
  padding:36px;width:480px;max-width:90vw;position:relative;
  animation:mslide .3s ease;max-height:85vh;overflow-y:auto;
}
@keyframes mslide{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.slot-modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.sm-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:300;margin-bottom:6px;letter-spacing:-.02em}
.sm-info{font-size:13px;color:var(--text-m);margin-bottom:22px;font-family:'Onest',sans-serif}
.sm-info strong{color:var(--text)}
.slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 0 20px}
.sl{
  padding:10px 8px;text-align:center;border:1px solid var(--border);
  font-size:12px;font-family:'Onest',sans-serif;font-weight:400;letter-spacing:.05em;
  transition:all .15s;color:var(--text);background:transparent;
}
.sl:not(:disabled):hover{border-color:var(--gold);background:var(--gold-g);color:var(--gold)}
.sl.sel{border-color:var(--gold);background:var(--gold-g);color:var(--gold)}
.sl:disabled{opacity:.28;cursor:not-allowed}
.sm-acts{display:flex;gap:10px}
.sm-confirm{
  flex:1;padding:12px 20px;background:var(--gold);color:var(--navy-d);
  font-family:'Onest',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.18em;text-transform:uppercase;border:none;
  transition:opacity .2s;
}
.sm-confirm:disabled{opacity:.35}
.sm-cancel{
  padding:12px 20px;background:transparent;color:var(--text-m);
  font-family:'Onest',sans-serif;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;border:1px solid var(--border);transition:all .2s;
}
.sm-cancel:hover{border-color:var(--border-m);color:var(--text)}

/* Schedule view */
.sched-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'Onest',sans-serif}
.sched-table th{
  padding:10px 14px;text-align:left;color:var(--text-d);
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  border-bottom:1px solid var(--border);font-weight:300;
}
.sched-table td{padding:11px 14px;border-bottom:1px solid rgba(30,33,48,.45);vertical-align:middle}
.sched-table tr:last-child td{border-bottom:none}
.s-time{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:300;color:var(--gold)}
.s-status{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:10px;letter-spacing:.06em}
.s-conf{background:rgba(79,195,161,.1);color:#4FC3A1}
.s-pend{background:rgba(178,144,106,.1);color:var(--gold)}
.s-dec{background:rgba(232,123,123,.1);color:#E87B7B}

/* Notif */
.notif{
  position:fixed;top:20px;right:20px;z-index:2000;
  background:var(--surf-d);border:1px solid var(--border);
  border-left:2px solid var(--gold);padding:14px 18px;
  font-size:13px;font-family:'Onest',sans-serif;max-width:300px;
  animation:nslide .3s ease;
}
@keyframes nslide{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Buyer incoming */
.req-card{
  background:rgba(26,29,74,.5);border:1px solid var(--border);
  padding:16px;margin-bottom:10px;transition:border-color .2s;
}
.req-card:hover{border-color:var(--border-m)}
.req-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.req-acts{display:flex;gap:8px;flex-wrap:wrap}
.req-btn{
  padding:7px 14px;font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;transition:all .2s;
  font-family:'Onest',sans-serif;font-weight:400;
}
.rb-ok{background:rgba(79,195,161,.12);color:#4FC3A1;border:1px solid rgba(79,195,161,.22)}
.rb-ok:hover{background:rgba(79,195,161,.22)}
.rb-mv{background:transparent;color:var(--text-m);border:1px solid var(--border)}
.rb-mv:hover{border-color:var(--border-m);color:var(--text)}
.rb-no{background:rgba(232,123,123,.1);color:#E87B7B;border:1px solid rgba(232,123,123,.18)}
.rb-no:hover{background:rgba(232,123,123,.18)}

/* Admin matrix */
.matrix-wrap{overflow-x:auto}
.mtx{width:100%;border-collapse:collapse;font-size:11px;font-family:'Onest',sans-serif}
.mtx th{
  padding:9px 12px;text-align:left;color:var(--text-d);
  font-size:9px;letter-spacing:.15em;text-transform:uppercase;
  border-bottom:1px solid var(--border);font-weight:300;min-width:110px;
}
.mtx td{padding:10px 12px;border-bottom:1px solid rgba(30,33,48,.4);vertical-align:middle}
.mtx-time{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:300;color:var(--gold)}
.mtx-cell{font-size:11px}
.mtx-company{font-weight:400;color:var(--text)}
.mtx-empty{color:var(--text-d);font-size:10px}

/* Login */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 60% 50% at 25% 40%,rgba(48,54,114,.5),transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 70%,rgba(178,144,106,.08),transparent 50%),
    linear-gradient(160deg,#141740,#0a0c22 60%,#130f2a);
}
.login-card{
  width:420px;background:var(--surf-d);border:1px solid var(--border);
  padding:44px;position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.lc-logo{text-align:center;margin-bottom:32px}
.lc-logo img{height:36px;display:block;margin:0 auto 14px}
.lc-tagline{
  font-family:'Unbounded',sans-serif;font-size:11px;font-weight:300;
  letter-spacing:.2em;text-transform:uppercase;color:var(--text-d);
}
label{
  display:block;color:var(--text-d);font-size:10px;
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:7px;
  font-family:'Onest',sans-serif;font-weight:400;
}
input,select{
  width:100%;background:var(--navy-d);border:1px solid var(--border);
  padding:12px 14px;color:var(--text);
  font-family:'Onest',sans-serif;font-size:14px;font-weight:300;
  margin-bottom:18px;outline:none;transition:border-color .2s;border-radius:0;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus{border-color:var(--gold-b)}
select option{background:#1a1d4a}
.login-btn{
  width:100%;padding:14px;background:var(--gold);color:var(--navy-d);
  font-family:'Onest',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.22em;text-transform:uppercase;border:none;
  transition:opacity .2s;
}
.login-btn:hover{opacity:.88}
.login-err{color:#E87B7B;font-size:12px;margin-top:-10px;margin-bottom:14px;font-family:'Onest',sans-serif}
.demo-hint{
  margin-top:24px;padding:14px 16px;
  background:var(--navy-d);border:1px solid var(--border);
}
.dh-title{font-size:9px;color:var(--text-d);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;font-family:'Onest',sans-serif}
.dh-row{font-size:11px;color:var(--text-d);line-height:1.9;font-family:'Onest',sans-serif}

/* Platform access cards */
.access-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}
.ac-card{
  background:var(--surf-d);border:1px solid var(--border);padding:20px;
  transition:border-color .3s;
}
.ac-card:hover{border-color:var(--border-m)}
.ac-card.gold-card{border-color:rgba(178,144,106,.28)}
.ac-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-family:'Onest',sans-serif}
.ac-title{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:400;margin-bottom:8px;letter-spacing:-.01em}
.ac-info{font-size:11px;color:var(--text-d);line-height:1.8;font-family:'Onest',sans-serif}

/* FOOTER */
footer{
  padding:70px 56px 36px;border-top:1px solid var(--border);
}
.foot-in{max-width:1200px;margin:0 auto}
.foot-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:52px;gap:40px}
.foot-brand img{height:30px;display:block;margin-bottom:18px}
.foot-tagline{
  font-family:'Onest',sans-serif;font-size:13px;font-style:italic;
  color:var(--text-m);max-width:260px;line-height:1.7;font-weight:300;
}
.foot-cols{display:flex;gap:64px}
.fc-title{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;font-family:'Onest',sans-serif}
.fc-link{
  display:block;font-size:13px;color:var(--text-m);text-decoration:none;
  margin-bottom:10px;transition:color .2s;font-weight:300;font-family:'Onest',sans-serif;
}
.fc-link:hover{color:var(--text)}
.foot-bot{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:28px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text-d);font-family:'Onest',sans-serif;
}
.foot-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:cpulse 2.5s infinite}

/* REVEAL */
.rev{opacity:0;transform:translateY(28px);transition:opacity .75s ease,transform .75s ease}
.rev.vis{opacity:1;transform:translateY(0)}
@keyframes fup{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}

/* RESPONSIVE */
@media(max-width:1024px){
  nav{padding:0 28px}
  .hero,.sec,.sol-sec,.how-sec,.sch-sec,.mtch-sec,.stats{padding-left:28px;padding-right:28px}
  footer{padding-left:28px;padding-right:28px}
  .sol-layout{grid-template-columns:1fr;gap:56px}
  .diag{height:380px}
  .why-grid{grid-template-columns:1fr}
  .sch-grid{grid-template-columns:repeat(2,1fr)}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .nav-links{display:none}
  .access-grid{grid-template-columns:1fr}
}
@media(max-width:640px){
  .hero h1{font-size:36px}
  .sch-grid{grid-template-columns:1fr}
  .hero-acts{flex-direction:column;align-items:center}
  .foot-top{flex-direction:column}
  .foot-cols{gap:32px;flex-direction:column}
}
/* Scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* LANDING */
.land{min-height:100vh;overflow-x:hidden}
.lnav{
  position:fixed;top:0;left:0;right:0;height:68px;padding:0 56px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,12,38,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);z-index:500;
}
.lnav-logo img{height:32px;display:block}
.lnav-links{display:flex;gap:32px;list-style:none}
.lnav-links a{
  color:var(--text-m);text-decoration:none;
  font-family:'Onest',sans-serif;font-size:11px;font-weight:400;
  letter-spacing:.2em;text-transform:uppercase;transition:color .25s;
}
.lnav-links a:hover{color:var(--gold)}
.lnav-btn{
  padding:9px 24px;border:1px solid var(--gold);color:var(--gold);
  font-family:'Onest',sans-serif;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;background:transparent;
  transition:all .3s;text-decoration:none;display:inline-block;
}
.lnav-btn:hover{background:var(--gold);color:var(--navy-d)}

/* HERO */
.lhero{
  min-height:100vh;position:relative;display:flex;align-items:center;
  justify-content:center;overflow:hidden;padding:120px 56px 100px;
  background:
    radial-gradient(ellipse 70% 55% at 12% 45%,rgba(48,54,114,.7),transparent 60%),
    radial-gradient(ellipse 45% 35% at 88% 25%,rgba(178,144,106,.1),transparent 50%),
    linear-gradient(165deg,#141740 0%,#0b0d28 45%,#13112e 100%);
}
.lhero-wave{position:absolute;inset:0;overflow:hidden;opacity:.09}
.lhero-wave svg{position:absolute;bottom:-15%;left:-5%;width:110%;animation:wdrift 20s ease-in-out infinite alternate}
.lorb{position:absolute;border-radius:50%;filter:blur(72px);animation:ofl 14s ease-in-out infinite alternate}
.lorb1{width:400px;height:400px;background:radial-gradient(circle,rgba(48,54,114,.6),transparent);top:-80px;right:-60px}
.lorb2{width:280px;height:280px;background:radial-gradient(circle,rgba(178,144,106,.14),transparent);bottom:80px;left:8%;animation-delay:-5s;animation-duration:11s}
.lhero-in{position:relative;z-index:2;max-width:860px;text-align:center}
.lh-eyebrow{display:inline-flex;align-items:center;gap:14px;margin-bottom:32px;opacity:0;animation:fup .8s .2s ease forwards}
.lh-el{width:36px;height:1px;background:var(--gold);opacity:.5}
.lh-et{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:400;font-family:'Onest',sans-serif}
.lhero h1{
  font-family:'Unbounded',sans-serif;font-size:clamp(42px,7vw,80px);
  font-weight:300;line-height:1.08;letter-spacing:-.02em;margin-bottom:12px;
  opacity:0;animation:fup .9s .4s ease forwards;
}
.lhero h1 em{font-style:normal;color:var(--gold-lt)}
.lhero-sub{
  font-family:'Onest',sans-serif;font-size:clamp(14px,2vw,17px);
  color:var(--text-m);margin-bottom:40px;font-weight:300;
  opacity:0;animation:fup .9s .6s ease forwards;
}
.lhero-desc{
  font-size:15px;line-height:1.85;color:var(--text-m);
  max-width:500px;margin:0 auto 50px;font-weight:300;
  opacity:0;animation:fup .9s .8s ease forwards;
}
.lhero-desc strong{color:var(--gold-lt);font-weight:400}
.lhero-acts{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;opacity:0;animation:fup .9s 1s ease forwards}
.lscroll{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:0;animation:fi 1s 1.6s ease forwards;
}
.lscr-line{width:1px;height:44px;background:linear-gradient(180deg,transparent,var(--gold));animation:sp 2.2s ease-in-out infinite}
.lscr-txt{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-d);font-family:'Onest',sans-serif}

/* STATS strip on landing */
.lstats{padding:0 56px}
.lstats-g{
  max-width:1200px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);border:1px solid var(--border);
}

/* FEATURES landing */
.lfeats-sec{padding:100px 56px;position:relative}
.lfeats-sec::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent,rgba(26,29,74,.3) 50%,transparent);
  pointer-events:none;
}
.lfeats-g{
  max-width:1200px;margin:60px auto 0;
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--border);border:1px solid var(--border);
}
.lfeat{
  background:var(--navy-d);padding:44px 36px;
  position:relative;overflow:hidden;transition:background .4s;
}
.lfeat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .5s;
}
.lfeat:hover{background:var(--surf)}
.lfeat:hover::before{transform:scaleX(1)}
.lfeat-ico{
  width:44px;height:44px;border:1px solid var(--gold-g);
  display:flex;align-items:center;justify-content:center;margin-bottom:20px;
  transition:border-color .3s,background .3s;
}
.lfeat:hover .lfeat-ico{border-color:var(--gold);background:var(--gold-g)}
.lfeat-ico svg{width:20px;height:20px;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.lfeat-t{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:400;margin-bottom:12px;letter-spacing:-.01em;line-height:1.3}
.lfeat-d{font-size:13px;line-height:1.8;color:var(--text-m);font-weight:300}

/* HOW section on landing */
.lhow-sec{padding:100px 56px;background:rgba(18,20,55,.4)}
.lhow-g{
  max-width:1200px;margin:60px auto 0;
  display:grid;grid-template-columns:repeat(3,1fr);gap:32px;
}
.lhow-card{padding:32px 28px;border:1px solid var(--border);position:relative;transition:border-color .3s}
.lhow-card:hover{border-color:var(--border-m)}
.lhow-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--gold),transparent);opacity:0;transition:opacity .3s;
}
.lhow-card:hover::after{opacity:1}
.lhow-n{font-family:'Unbounded',sans-serif;font-size:36px;font-weight:300;color:rgba(178,144,106,.2);margin-bottom:16px}
.lhow-t{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:400;margin-bottom:10px;letter-spacing:-.01em}
.lhow-d{font-size:13px;color:var(--text-m);line-height:1.75;font-weight:300}

/* CTA / REGISTER section */
.lreg-sec{
  padding:100px 56px;
  background:linear-gradient(135deg,rgba(48,54,114,.15),rgba(178,144,106,.06));
  position:relative;overflow:hidden;
}
.lreg-sec::before{
  content:'';position:absolute;right:-200px;top:50%;transform:translateY(-50%);
  width:600px;height:600px;border:1px solid var(--border);border-radius:50%;opacity:.15;
}
.lreg-in{max-width:700px;margin:0 auto;text-align:center}
.lreg-date{
  display:inline-flex;align-items:center;gap:12px;
  padding:10px 24px;border:1px solid var(--gold-b);background:var(--gold-g);
  margin-bottom:40px;
}
.lreg-date-icon svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.lreg-date-txt{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-family:'Onest',sans-serif}

/* FOOTER landing */
.lfoot{padding:56px 56px 32px;border-top:1px solid var(--border)}
.lfoot-in{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px}
.lfoot-left img{height:28px;display:block;margin-bottom:10px}
.lfoot-tagline{font-size:12px;color:var(--text-d);font-family:'Onest',sans-serif;font-style:italic}
.lfoot-right{font-size:11px;color:var(--text-d);font-family:'Onest',sans-serif;text-align:right}

// STORAGE (localStorage for persistence)
// ═══════════════════════════════════════════

const STORE_KEY = "ts_meetings_v2";

function loadMeetings(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)||"[]"); }catch(e){ return []; }
}
function saveMeetings(arr){ localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }

let meetings = loadMeetings();
let mid = meetings.length ? Math.max(...meetings.map(m=>m.id))+1 : 1;

function addMeeting(m){ meetings.push(m); saveMeetings(meetings); }
function updateMeeting(id, patch){
  const m = meetings.find(x=>x.id===id);
  if(m){ Object.assign(m, patch); saveMeetings(meetings); }
}

function sellerSlots(sellerId){
  return meetings.filter(m=>m.sellerId===sellerId && m.status!=="declined").map(m=>m.slot);
}
function buyerSlots(buyerId){
  return meetings.filter(m=>m.buyerId===buyerId && m.status!=="declined").map(m=>m.slot);
}
function propose(sellerId, buyerId, slot){
  if(sellerSlots(sellerId).includes(slot)) return {ok:false,e:"Ваш слот уже занят"};
  if(buyerSlots(buyerId).includes(slot)) return {ok:false,e:"У байера занят этот слот"};
  if(meetings.find(m=>m.sellerId===sellerId&&m.buyerId===buyerId)) return {ok:false,e:"Встреча уже создана"};
  addMeeting({id:mid++, sellerId, buyerId, slot, status:"pending", by:"seller"});
  return {ok:true};
}

// ═══════════════════════════════════════════
// MATCH SCORE
// ═══════════════════════════════════════════

function match(seller, buyer){
  const common = seller.directions.filter(d=>
    buyer.directions.some(bd=>bd.toLowerCase().includes(d.toLowerCase())||d.toLowerCase().includes(bd.toLowerCase()))
  ).length;
  const base = 38 + (common / Math.max(seller.directions.length,1))*48;
  // deterministic noise based on ids
  const noise = ((seller.id.charCodeAt(1)*7 + buyer.id.charCodeAt(1)*13) % 14);
  return Math.min(Math.round(base + noise), 99);
}

function matchColor(s){ return s>=80?"#4FC3A1":s>=60?"#B2906A":"#6b6580"; }

function ico(name, size=16, color="currentColor"){
  const svg = ICONS[name]||"";
  return svg.replace("<svg","<svg width=\""+size+"\" height=\""+size+"\" stroke=\""+color+"\" fill=\"none\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"");
}

let notifTimer = null;
function notify(msg){
  let el = document.getElementById("notif");
  if(!el){ el = document.createElement("div"); el.id="notif"; el.className="notif"; document.body.appendChild(el); }
  el.innerHTML = msg; el.style.display = "block";
  if(notifTimer) clearTimeout(notifTimer);
  notifTimer = setTimeout(()=>{ if(el) el.style.display="none"; }, 3500);
}

  document.querySelectorAll('a[href^="#l"]').forEach(a=>{
    a.addEventListener("click",e=>{
      e.preventDefault();
      const t = document.querySelector(a.getAttribute("href"));
      if(t) t.scrollIntoView({behavior:"smooth",block:"start"});
    });
  });
  setTimeout(initReveal, 80);
}

function bindLogin(){
  const lr = document.getElementById("lr");
  const uw = document.getElementById("uid-wrap");
  const uid = document.getElementById("uid");

  function fillUsers(){
    const role = lr.value;
    uw.style.display = role==="admin" ? "none" : "block";
    uid.innerHTML = "";
    const arr = role==="seller" ? SELLERS : BUYERS;
    arr.forEach(u => { uid.innerHTML += `<option value="${u.id}">${u.company}</option>`; });
  }
  fillUsers();
  lr.addEventListener("change", fillUsers);
  document.getElementById("back-to-landing")?.addEventListener("click",()=>{ view="landing"; render(); });

  // password toggle
  const pwToggle = document.getElementById("pw-toggle");
  const pwInput  = document.getElementById("lpw");
  if(pwToggle && pwInput){
    pwToggle.addEventListener("click", () => {
      const show = pwInput.type === "password";
      pwInput.type = show ? "text" : "password";
      document.getElementById("pw-eye").innerHTML = show
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      pwToggle.style.color = show ? "var(--gold)" : "var(--text-d)";
    });
  }

  document.getElementById("lbtn").addEventListener("click", () => {
    const role = lr.value;
    const pw = document.getElementById("lpw").value;
    const err = document.getElementById("lerr");

    if(role==="admin"){
      if(pw!=="admin123"){ err.textContent="Неверный пароль"; err.style.display="block"; return; }
      user = {id:"admin",name:"Организатор",role:"admin",logo:"AD"};
    } else {
      const arr = role==="seller" ? SELLERS : BUYERS;
      const u = arr.find(x=>x.id===uid.value);
      if(!u){ err.textContent="Выберите участника"; err.style.display="block"; return; }
      if(u.pw!==pw){ err.textContent="Неверный пароль"; err.style.display="block"; return; }
      user = {...u, role};
    }
    page = role==="seller" ? "matches" : role==="buyer" ? "requests" : "dashboard";
    view = "app";
    render();
  });

  document.getElementById("lpw").addEventListener("keydown", e => {
    if(e.key==="Enter") document.getElementById("lbtn").click();
  });
}

        <div class="ps-user" style="margin-bottom:10px">
          <div class="ps-avatar" ${avatarClass}>${user.logo}</div>
          <div>
            <div class="ps-name">${user.company||user.name}</div>
            <div class="ps-role">${user.role==="seller"?"Селлер":user.role==="buyer"?"Байер":"Организатор"}</div>
          </div>
        </div>
        <div class="ps-nav" id="logout-btn" style="padding:8px 0">
          ${ico("logout",14)} Выйти
        </div>
      </div>
    </div>

    <div style="margin-left:195px;flex:1;padding:36px 40px;min-height:100vh;max-width:calc(100vw - 195px)">
      ${renderPage()}
    </div>
  </div>
  ${renderSlotModal()}
  ${renderReschedModal()}`;
}

function renderPage(){
  if(user.role==="seller"){
    if(page==="matches") return renderSellerMatches();
    if(page==="schedule") return renderSellerSchedule();
    if(page==="profile") return renderProfile();
  }
  if(user.role==="buyer"){
    if(page==="requests") return renderBuyerRequests();
    if(page==="schedule") return renderBuyerSchedule();
    if(page==="profile") return renderProfile();
  }
  if(user.role==="admin"){
    if(page==="dashboard") return renderAdminDashboard();
    if(page==="participants") return renderAdminParticipants();
  }
  return "";
}

// ═══════════════════════════════════════════
// SELLER: MATCHES
// ═══════════════════════════════════════════

function renderSellerMatches(){
  const buyers = BUYERS.map(b=>({...b, matchRate:match(user,b), met:!!meetings.find(m=>m.sellerId===user.id&&m.buyerId===b.id)}))
    .sort((a,b)=>b.matchRate-a.matchRate);
  const taken = sellerSlots(user.id).length;

  const cards = buyers.map(b=>`
    <div class="mcard" style="${b.met?"opacity:.7":""}">
      <div class="mc-av">${b.logo}</div>
      <div style="flex:1">
        <div class="mc-name">${b.company}</div>
        <div class="mc-dirs">${b.directions.slice(0,3).join(" · ")}</div>
      </div>
      <div class="mc-pct${b.matchRate<65?" med":""}">${b.matchRate}%</div>
      ${b.met
        ? `<span class="mc-confirmed">${ico("check",10,"#4FC3A1")} Создана</span>`
        : `<button class="mc-btn" data-open="${b.id}">+ Встреча</button>`
      }
    </div>`).join("");

  return `
    <div>
      <h2 style="font-size:28px;margin-bottom:6px">Назначить встречи</h2>
      <p style="color:var(--text-m);font-size:13px;margin-bottom:20px">Вы — платный участник. Назначайте встречи первыми.</p>
      <div class="pm-pri">
        ${ico("crown",15,"var(--gold)")}
        <span><strong>Приоритетное право</strong> — вы выбираете байера и назначаете время. Байер получает запрос и подтверждает.</span>
      </div>
      <div style="font-size:12px;color:var(--text-d);margin-bottom:16px">
        Занято слотов: <strong style="color:var(--gold)">${taken}</strong> / ${SLOTS.length}
      </div>
      <div class="mcards">${cards}</div>
    </div>`;
}

// ═══════════════════════════════════════════
// SELLER: SCHEDULE
// ═══════════════════════════════════════════

function renderSellerSchedule(){
  const mtgs = meetings.filter(m=>m.sellerId===user.id)
    .sort((a,b)=>SLOTS.indexOf(a.slot)-SLOTS.indexOf(b.slot));
  if(!mtgs.length) return `<div><h2 style="font-size:28px;margin-bottom:20px">Расписание</h2><div style="text-align:center;padding:64px 32px;color:var(--text-d)">Встреч пока нет — назначьте их во вкладке «Назначить встречи»</div></div>`;

  const rows = mtgs.map(m=>{
    const b = BUYERS.find(x=>x.id===m.buyerId);
    const sc = m.status==="confirmed"?"s-conf":m.status==="pending"?"s-pend":"s-dec";
    const sl = m.status==="confirmed"?"✓ Подтверждена":m.status==="pending"?"⏳ Ожидает":"✗ Отклонена";
    return `<tr>
      <td class="s-time">${m.slot}</td>
      <td>${b?.name}</td>
      <td style="color:var(--text-m)">${b?.company}</td>
      <td><span class="s-status ${sc}">${sl}</span></td>
    </tr>`;
  }).join("");

  return `<div>
    <h2 style="font-size:28px;margin-bottom:6px">Моё расписание</h2>
    <p style="color:var(--text-m);font-size:13px;margin-bottom:24px">Стол №${user.table} · ${meetings.filter(m=>m.sellerId===user.id&&m.status==="confirmed").length} подтверждено</p>
    <div style="background:rgba(12,14,40,.8);border:1px solid var(--border);overflow:auto">

      </tr></thead><tbody>${rows}</tbody></table>
    </div>
  </div>`;
}

function renderAdminDashboard(){
  const total = meetings.length;
  const conf = meetings.filter(m=>m.status==="confirmed").length;
  const pend = meetings.filter(m=>m.status==="pending").length;

  const matrixRows = SLOTS.map(slot=>`
    <tr>
      <td class="mtx-time">${slot}</td>
      ${SELLERS.map(s=>{
        const m = meetings.find(x=>x.sellerId===s.id&&x.slot===slot&&x.status!=="declined");
        const b = m ? BUYERS.find(x=>x.id===m.buyerId) : null;
        const sc = m ? (m.status==="confirmed"?"s-conf":"s-pend") : "";
        return `<td class="mtx-cell">${b
          ? `<div class="mtx-company">${b.company}</div><span class="s-status ${sc}" style="font-size:9px;padding:2px 7px">${m.status==="confirmed"?"✓":"⏳"}</span>`
          : `<span class="mtx-empty">—</span>`}</td>`;

  return `<div>
    <h2 style="font-size:28px;margin-bottom:6px">Панель организатора</h2>
    <p style="color:var(--text-m);font-size:13px;margin-bottom:28px">Travel Synergy by Corona Travel</p>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:32px">

        {n:BUYERS.length, l:"Байеров",c:"#7B9FE8"},

      ].map(s=>`<div class="stat" style="padding:32px 28px">

    <div class="matrix-wrap" style="background:rgba(12,14,40,.8);border:1px solid var(--border);margin-bottom:28px">
      <table class="mtx">
        <thead><tr>
          <th style="min-width:70px">Время</th>
          ${SELLERS.map(s=>`<th>${s.company}<br><span style="color:var(--text-d);font-size:8px">Стол №${s.table}</span></th>`).join("")}

      <tbody>${meetings.map(m=>{
        const s=SELLERS.find(x=>x.id===m.sellerId);

        const sc=m.status==="confirmed"?"s-conf":m.status==="pending"?"s-pend":"s-dec";

// MODALS
// ═══════════════════════════════════════════

function renderSlotModal(){
  if(!slotModal) return `<div class="slot-modal-bg" id="slotModal"></div>`;
  const buyer = BUYERS.find(b=>b.id===slotModal);
  const mySl = sellerSlots(user.id||"");
  const buyerSl = buyerSlots(slotModal);
  const grid = SLOTS.map(s=>{
    const taken = mySl.includes(s)||buyerSl.includes(s);
    const sel = selectedSlot===s;
    return `<button class="sl${sel?" sel":""}${taken?" taken":""}" ${taken?"disabled":""} data-slot="${s}">${s}${taken?`<span style="display:block;font-size:8px;opacity:.5;margin-top:1px">занят</span>`:""}</button>`;
  }).join("");
  return `<div class="slot-modal-bg open" id="slotModal">
    <div class="slot-modal" onclick="event.stopPropagation()">
      <div class="sm-title">Выбрать время</div>
      <div class="sm-info">Байер: <strong>${buyer?.company}</strong> · Match Rate: <span style="color:${matchColor(match(user||{directions:[]},buyer||{directions:[]}))}">
        ${match(user||{directions:[]},buyer||{directions:[]})}%</span>
      </div>
      <div class="slot-grid">${grid}</div>
      <div class="sm-acts">
        <button class="sm-confirm" id="slotConfirmBtn" ${!selectedSlot?"disabled":""}>
          Предложить${selectedSlot?` в ${selectedSlot}`:""}
        </button>
        <button class="sm-cancel" id="slotCancelBtn">Отмена</button>
      </div>
    </div>
  </div>`;
}

function renderReschedModal(){
  if(!reschedModal) return `<div class="slot-modal-bg" id="reschedModal"></div>`;
  const mtg = meetings.find(m=>m.id===reschedModal);
  const buyerSl = buyerSlots(user.id||"").filter(s=>s!==mtg?.slot);
  const grid = SLOTS.map(s=>{
    const taken = buyerSl.includes(s);
    const sel = selectedSlot===s;
    return `<button class="sl${sel?" sel":""}${taken?" taken":""}" ${taken?"disabled":""} data-rslot="${s}">${s}</button>`;
  }).join("");
  return `<div class="slot-modal-bg open" id="reschedModal">
    <div class="slot-modal" onclick="event.stopPropagation()">
      <div class="sm-title">Предложить другое время</div>
      <div class="slot-grid">${grid}</div>
      <div class="sm-acts">
        <button class="sm-confirm" id="rslotConfirmBtn" ${!selectedSlot?"disabled":""}>Предложить${selectedSlot?` ${selectedSlot}`:""}</button>
        <button class="sm-cancel" id="rslotCancelBtn">Отмена</button>
      </div>
    </div>
  </div>`;
}

function bindApp(){
  // nav
  document.querySelectorAll("[data-page]").forEach(el=>{
    el.addEventListener("click",()=>{ page=el.dataset.page; render(); });
  });
  const lb = document.getElementById("logout-btn");
  if(lb) lb.addEventListener("click",()=>{ user=null; page=""; view="landing"; render(); });

  // seller open slot modal
  document.querySelectorAll("[data-open]").forEach(el=>{
    el.addEventListener("click",()=>{ slotModal=el.dataset.open; selectedSlot=""; render(); });
  });

  // slot selection
  document.querySelectorAll("[data-slot]").forEach(el=>{
    el.addEventListener("click",()=>{ selectedSlot=el.dataset.slot; render(); });
  });
  const scb = document.getElementById("slotConfirmBtn");
  if(scb) scb.addEventListener("click",()=>{
    if(!selectedSlot||!slotModal) return;
    const res = propose(user.id, slotModal, selectedSlot);
    if(res.ok){ notify("✓ Встреча предложена в "+selectedSlot); slotModal=null; selectedSlot=""; }
    else notify("⚠ "+res.e);
    render();
  });
  const sxb = document.getElementById("slotCancelBtn");
  if(sxb) sxb.addEventListener("click",()=>{ slotModal=null; selectedSlot=""; render(); });
  const sbg = document.getElementById("slotModal");
  if(sbg) sbg.addEventListener("click",()=>{ slotModal=null; selectedSlot=""; render(); });

  // buyer respond
  document.querySelectorAll("[data-confirm]").forEach(el=>{
    el.addEventListener("click",()=>{ updateMeeting(+el.dataset.confirm,{status:"confirmed"}); notify("✓ Встреча подтверждена"); render(); });
  });
  document.querySelectorAll("[data-decline]").forEach(el=>{
    el.addEventListener("click",()=>{ updateMeeting(+el.dataset.decline,{status:"declined"}); notify("Встреча отклонена"); render(); });
  });
  document.querySelectorAll("[data-reschedule]").forEach(el=>{
    el.addEventListener("click",()=>{ reschedModal=+el.dataset.reschedule; selectedSlot=""; render(); });
  });

  // resched slot
  document.querySelectorAll("[data-rslot]").forEach(el=>{
    el.addEventListener("click",()=>{ selectedSlot=el.dataset.rslot; render(); });
  });
  const rcb = document.getElementById("rslotConfirmBtn");
  if(rcb) rcb.addEventListener("click",()=>{
    if(!selectedSlot) return;
    updateMeeting(reschedModal,{slot:selectedSlot,status:"pending",by:"buyer"});
    notify("↺ Предложено новое время: "+selectedSlot);
    reschedModal=null; selectedSlot=""; render();
  });
  const rxb = document.getElementById("rslotCancelBtn");
  if(rxb) rxb.addEventListener("click",()=>{ reschedModal=null; selectedSlot=""; render(); });
  const rbg = document.getElementById("reschedModal");
  if(rbg) rbg.addEventListener("click",()=>{ reschedModal=null; selectedSlot=""; render(); });
}

// SCROLL REVEAL
// ═══════════════════════════════════════════

function initReveal(){
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add("vis"); });
  },{threshold:0.1});
  document.querySelectorAll(".rev").forEach(el=>obs.observe(el));
}

    cur.style.width="7px"; cur.style.height="7px";
    curR.style.width="32px"; curR.style.height="32px";

});
